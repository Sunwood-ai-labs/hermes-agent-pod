services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: sandbox-hermes-agent
    restart: unless-stopped
    command: gateway run
    ports:
      - "127.0.0.1:8642:8642"
      - "127.0.0.1:9119:9119"
    volumes:
      - ./data:/opt/data
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_TUI: "1"
      HERMES_INFERENCE_PROVIDER: "gemini"
      HERMES_INFERENCE_MODEL: "gemma-4-31b-it"
      GEMINI_BASE_URL: "https://generativelanguage.googleapis.com/v1beta"
      HERMES_UID: "501"
      HERMES_GID: "20"
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: "local-hermes-dev-change-me"
    shm_size: "1gb"
    stop_grace_period: 30s
